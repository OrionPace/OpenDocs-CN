# LLM provider configuration.
#
# Fallback chain (in order):
#   1. DeepSeek official API — primary, flash only (required)
#   2. NVIDIA NIM — free endpoint, deepseek-ai/deepseek-v4-flash (optional, rate-limited)
#   3. OpenRouter — paid fallback (optional if key not set)
#
# If a provider's envKey is not set and optional=true, it is silently skipped.
# If envKey is not set and optional=false, startup fails with an error.

providers:
  - name: deepseek
    baseUrl: https://api.deepseek.com
    defaultModel: deepseek-v4-flash
    envKey: DEEPSEEK_API_KEY
    optional: false

  - name: nvidia-nim
    baseUrl: https://integrate.api.nvidia.com/v1
    defaultModel: deepseek-ai/deepseek-v4-flash
    envKey: NVIDIA_API_KEY
    optional: true

  - name: openrouter
    baseUrl: https://openrouter.ai/api/v1
    defaultModel: deepseek/deepseek-chat
    envKey: OPENROUTER_API_KEY
    modelEnvKey: OPENROUTER_MODEL
    optional: true

# Per-block limits.
maxBlockTokens: 1500

# Concurrency controls.
concurrency:
  blocksPerFile: 5
  filesInParallel: 2
